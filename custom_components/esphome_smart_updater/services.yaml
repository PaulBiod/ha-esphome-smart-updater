start_campaign:
  name: Start campaign
  description: Start an ESPHome Smart Updater campaign.

pause_campaign:
  name: Pause campaign
  description: Request pause for the current campaign.

resume_campaign:
  name: Resume campaign
  description: Resume a paused campaign.

stop_campaign:
  name: Stop campaign
  description: Stop the current campaign.

clear_report:
  name: Clear report
  description: Clear the last stored campaign report and purge the stored campaign lists.

preview_campaign:
  name: Preview campaign
  description: Generate a preview of the next update campaign without executing it.
  fields:
    entity_ids:
      name: Entities
      description: Optional list of update entities to preview.
      required: false
      example:
        - update.device1_firmware
        - update.device2_firmware
      selector:
        object:
