blueprint:
  name: ESPHome Smart Updater — Campaign Finished Actions
  description: >
    Run custom actions when an ESPHome Smart Updater campaign finishes.

    ⚠️ Requirements:
    This blueprint requires the "ESPHome Smart Updater" custom integration.
    It will not work without it.

    Install the integration:
    https://github.com/PaulBiod/ha-esphome-smart-updater

    Note:
    ESPHome Smart Updater already creates a persistent notification with
    the final campaign report. This blueprint is for additional actions only.

    This blueprint reacts to the esphome_smart_updater_campaign_finished event.
    It works regardless of how the campaign was started.

    Logic:
      - If at least one device failed, the Error action is executed.
      - If no device failed, the Success action is executed.
      - The Always run action is executed every time, after success/error.

    Available variables:
      - esu_result: >
          Overall campaign result (string). Typically "success" or "error".
      - esu_done: >
          Number of devices successfully updated.
      - esu_failed: >
          Number of devices that failed to update (timeouts, errors, etc.).
          ⚠️ If this is > 0, the Error action will run.
      - esu_skipped: >
          Number of devices skipped (not eligible, already updated, etc.).
          Not considered an error.
      - esu_unavailable: >
          Number of devices unavailable during the campaign.
          Usually not counted as failures unless handled as such by the integration.
      - esu_last_report: >
          Full human-readable report of the campaign (same as the persistent notification).
          Recommended for notifications.

    Example (mobile / Telegram):

      action: notify.mobile_app_your_phone
      data:
        title: ESPHome Smart Updater
        message: "{{ esu_last_report }}"

    Example (Alexa):

      action: notify.alexa_media_your_echo
      data:
        message: "{{ esu_last_report }}"
        data:
          type: announce

    Example (Google TTS):

      action: tts.speak
      target:
        entity_id: tts.google_translate_en_com
      data:
        media_player_entity_id: media_player.your_speaker
        message: "ESPHome update finished. {{ esu_failed }} failed, {{ esu_done }} succeeded."

  domain: automation

  input:
    success_action:
      name: Success action
      description: >
        Optional. Actions to run only when the campaign finishes with no failed devices
        (esu_failed = 0). Skipped or unavailable devices do not trigger this as an error
        unless the integration reports them as failed.
      default: []
      selector:
        action: {}

    error_action:
      name: Error action
      description: >
        Optional. Actions to run when the campaign finishes with at least one failed device
        (esu_failed > 0). Use this for urgent notifications, TTS announcements,
        warning lights, recovery scripts, etc.
      default: []
      selector:
        action: {}

    always_action:
      name: Always run action
      description: >
        Optional. Actions to run every time a campaign finishes, regardless of the result.
        This runs after the Success action or Error action. Use it for common cleanup,
        logging, helper updates, webhooks, or a generic final notification.
      default: []
      selector:
        action: {}

mode: queued
max: 10

trigger:
  - platform: event
    event_type: esphome_smart_updater_campaign_finished

action:
  - variables:
      esu_result: "{{ trigger.event.data.result | default('unknown') }}"
      esu_done: "{{ trigger.event.data.done | default(0) | int(0) }}"
      esu_failed: "{{ trigger.event.data.failed | default(0) | int(0) }}"
      esu_skipped: "{{ trigger.event.data.skipped | default(0) | int(0) }}"
      esu_unavailable: "{{ trigger.event.data.unavailable | default(0) | int(0) }}"
      esu_last_report: >-
        {{ trigger.event.data.last_report
          | default(state_attr('sensor.esphome_smart_updater_campaign', 'last_report'), true)
          | default('', true) }}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ esu_failed | int(0) > 0 }}"
        sequence: !input error_action
    default: !input success_action

  - sequence: !input always_action
