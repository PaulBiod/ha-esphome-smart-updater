blueprint:
  name: ESPHome Smart Updater — Campaign Finished Actions
  description: >
    Run custom actions when an ESPHome Smart Updater campaign finishes.

    ⚠️ Requirements:
    This blueprint requires the "ESPHome Smart Updater" custom integration.
    It will not work without it.

    Install the integration:
    https://github.com/PaulBiod/ha-esphome-smart-updater

    Note:
    ESPHome Smart Updater already creates its own persistent notification with
    the final campaign report. This blueprint does not replace that built-in
    report. It is intended for extra actions such as mobile notifications,
    Alexa announcements, Google TTS, Telegram messages, scripts, automations,
    webhooks, or any other Home Assistant action.

    This blueprint reacts to the esphome_smart_updater_campaign_finished event.
    It works regardless of how the campaign was started: scheduled blueprint,
    manual start, service call, or restored campaign after a Home Assistant restart.

    Available variables in custom actions:
      - esu_result: campaign result reported by the integration
      - esu_done: number of successfully updated devices
      - esu_failed: number of failed devices
      - esu_skipped: number of skipped devices
      - esu_unavailable: number of unavailable / unknown update status devices
      - esu_last_report: final report generated by ESPHome Smart Updater

    Basic examples for the Notification action:

    Mobile / Telegram:
      action: notify.mobile_app_your_phone
      data:
        title: ESPHome Smart Updater
        message: "{{ esu_last_report }}"

    Alexa:
      action: notify.alexa_media_your_echo
      data:
        message: "{{ esu_last_report }}"
        data:
          type: announce

    Google TTS:
      action: tts.speak
      target:
        entity_id: tts.google_translate_en_com
      data:
        media_player_entity_id: media_player.your_speaker
        message: "ESPHome update campaign finished. {{ esu_failed }} failed, {{ esu_done }} succeeded."

  domain: automation

  input:
    notification_mode:
      name: Notification mode
      description: >
        Choose when to run the notification action.
        The notification action is optional and can be a mobile notification,
        Alexa announcement, Google TTS, Telegram message, script, webhook, etc.
      default: always
      selector:
        select:
          options:
            - label: Always
              value: always
            - label: Only when errors are detected
              value: errors_only
            - label: Never
              value: never

    notification_action:
      name: Notification action
      description: >
        Optional. Define one or more actions to run according to the notification mode.
        You can use the exposed variables in templates, for example:
        {{ esu_last_report }}
      default: []
      selector:
        action: {}

    success_action:
      name: Success action
      description: >
        Optional. Actions to run only when the campaign finishes without failed devices.
        Example: turn off a helper, send a success notification, call a script, etc.
      default: []
      selector:
        action: {}

    error_action:
      name: Error action
      description: >
        Optional. Actions to run only when the campaign finishes with one or more failed devices.
        Example: send an urgent notification, play a TTS message, call a recovery script, etc.
      default: []
      selector:
        action: {}

    always_action:
      name: Always run action
      description: >
        Optional. Actions to run every time a campaign finishes, regardless of the result.
        Example: call a script, update an input helper, send a webhook, etc.
      default: []
      selector:
        action: {}

mode: queued
max: 10

trigger:
  - platform: event
    event_type: esphome_smart_updater_campaign_finished

action:
  - variables:
      notification_mode_value: !input notification_mode
      esu_result: "{{ trigger.event.data.result | default('unknown') }}"
      esu_done: "{{ trigger.event.data.done | default(0) | int(0) }}"
      esu_failed: "{{ trigger.event.data.failed | default(0) | int(0) }}"
      esu_skipped: "{{ trigger.event.data.skipped | default(0) | int(0) }}"
      esu_unavailable: "{{ trigger.event.data.unavailable | default(0) | int(0) }}"
      esu_last_report: >-
        {{ trigger.event.data.last_report
          | default(state_attr('sensor.esphome_smart_updater_campaign', 'last_report'), true)
          | default('', true) }}

  - choose:
      - conditions:
          - condition: template
            value_template: "{{ esu_failed | int(0) > 0 }}"
        sequence: !input error_action
    default: !input success_action

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ notification_mode_value == 'always'
                 or (notification_mode_value == 'errors_only' and esu_failed | int(0) > 0) }}
        sequence: !input notification_action

  - sequence: !input always_action
